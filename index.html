<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sawyer-Ship Manager</title>
    <link rel="icon" type="image/svg+xml" href="https://lucide.dev/favicon.ico" />
  </head>
  <style>
    @import "tailwindcss";
    @import "tw-animate-css";
    @import "shadcn/tailwind.css";
    @import "@fontsource-variable/geist";

    @custom-variant dark (&:is(.dark *));

    @theme inline {
        --font-heading: var(--font-sans);
        --font-sans: 'Geist Variable', sans-serif;
        --color-sidebar-ring: var(--sidebar-ring);
        --color-sidebar-border: var(--sidebar-border);
        --color-sidebar-accent-foreground: var(--sidebar-accent-foreground);
        --color-sidebar-accent: var(--sidebar-accent);
        --color-sidebar-primary-foreground: var(--sidebar-primary-foreground);
        --color-sidebar-primary: var(--sidebar-primary);
        --color-sidebar-foreground: var(--sidebar-foreground);
        --color-sidebar: var(--sidebar);
        --color-chart-5: var(--chart-5);
        --color-chart-4: var(--chart-4);
        --color-chart-3: var(--chart-3);
        --color-chart-2: var(--chart-2);
        --color-chart-1: var(--chart-1);
        --color-ring: var(--ring);
        --color-input: var(--input);
        --color-border: var(--border);
        --color-destructive: var(--destructive);
        --color-accent-foreground: var(--accent-foreground);
        --color-accent: var(--accent);
        --color-muted-foreground: var(--muted-foreground);
        --color-muted: var(--muted);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-secondary: var(--secondary);
        --color-primary-foreground: var(--primary-foreground);
        --color-primary: var(--primary);
        --color-popover-foreground: var(--popover-foreground);
        --color-popover: var(--popover);
        --color-card-foreground: var(--card-foreground);
        --color-card: var(--card);
        --color-foreground: var(--foreground);
        --color-background: var(--background);
        --radius-sm: calc(var(--radius) * 0.6);
        --radius-md: calc(var(--radius) * 0.8);
        --radius-lg: var(--radius);
        --radius-xl: calc(var(--radius) * 1.4);
        --radius-2xl: calc(var(--radius) * 1.8);
        --radius-3xl: calc(var(--radius) * 2.2);
        --radius-4xl: calc(var(--radius) * 2.6);
    }

    :root {
        --background: oklch(1 0 0);
        --foreground: oklch(0.145 0 0);
        --card: oklch(1 0 0);
        --card-foreground: oklch(0.145 0 0);
        --popover: oklch(1 0 0);
        --popover-foreground: oklch(0.145 0 0);
        --primary: oklch(0.205 0 0);
        --primary-foreground: oklch(0.985 0 0);
        --secondary: oklch(0.97 0 0);
        --secondary-foreground: oklch(0.205 0 0);
        --muted: oklch(0.97 0 0);
        --muted-foreground: oklch(0.556 0 0);
        --accent: oklch(0.97 0 0);
        --accent-foreground: oklch(0.205 0 0);
        --destructive: oklch(0.577 0.245 27.325);
        --border: oklch(0.922 0 0);
        --input: oklch(0.922 0 0);
        --ring: oklch(0.708 0 0);
        --chart-1: oklch(0.87 0 0);
        --chart-2: oklch(0.556 0 0);
        --chart-3: oklch(0.439 0 0);
        --chart-4: oklch(0.371 0 0);
        --chart-5: oklch(0.269 0 0);
        --radius: 0.625rem;
        --sidebar: oklch(0.985 0 0);
        --sidebar-foreground: oklch(0.145 0 0);
        --sidebar-primary: oklch(0.205 0 0);
        --sidebar-primary-foreground: oklch(0.985 0 0);
        --sidebar-accent: oklch(0.97 0 0);
        --sidebar-accent-foreground: oklch(0.205 0 0);
        --sidebar-border: oklch(0.922 0 0);
        --sidebar-ring: oklch(0.708 0 0);
    }

    .dark {
        --background: oklch(0.145 0 0);
        --foreground: oklch(0.985 0 0);
        --card: oklch(0.205 0 0);
        --card-foreground: oklch(0.985 0 0);
        --popover: oklch(0.205 0 0);
        --popover-foreground: oklch(0.985 0 0);
        --primary: oklch(0.922 0 0);
        --primary-foreground: oklch(0.205 0 0);
        --secondary: oklch(0.269 0 0);
        --secondary-foreground: oklch(0.985 0 0);
        --muted: oklch(0.269 0 0);
        --muted-foreground: oklch(0.708 0 0);
        --accent: oklch(0.269 0 0);
        --accent-foreground: oklch(0.985 0 0);
        --destructive: oklch(0.704 0.191 22.216);
        --border: oklch(1 0 0 / 10%);
        --input: oklch(1 0 0 / 15%);
        --ring: oklch(0.556 0 0);
        --chart-1: oklch(0.87 0 0);
        --chart-2: oklch(0.556 0 0);
        --chart-3: oklch(0.439 0 0);
        --chart-4: oklch(0.371 0 0);
        --chart-5: oklch(0.269 0 0);
        --sidebar: oklch(0.205 0 0);
        --sidebar-foreground: oklch(0.985 0 0);
        --sidebar-primary: oklch(0.488 0.243 264.376);
        --sidebar-primary-foreground: oklch(0.985 0 0);
        --sidebar-accent: oklch(0.269 0 0);
        --sidebar-accent-foreground: oklch(0.985 0 0);
        --sidebar-border: oklch(1 0 0 / 10%);
        --sidebar-ring: oklch(0.556 0 0);
    }

    @layer base {
      * {
        border-color: var(--border);
        outline-color: color-mix(in srgb, var(--ring) 50%, transparent);
      }
      body {
        background-color: var(--background);
        color: var(--foreground);
      }
      html {
        font-family: var(--font-sans);
      }
    }
  </style>
  <body class="bg-zinc-50">
    <div id="root"></div>
    <script type="module">
      import React, { useState, useEffect, StrictMode } from "react";
      import { createRoot } from 'react-dom/client';
      import htm from "htm";
      import { 
        LayoutDashboard, 
        Package, 
        Settings as SettingsIcon, 
        Truck, 
        RefreshCw, 
        Search,
        CheckCircle2,
        AlertCircle,
        FileText,
        ChevronRight,
        LogOut,
        LogIn,
        Mail,
        Lock,
        UserPlus,
        MoreHorizontal
      } from "lucide-react";
      import { Toaster, toast } from "sonner";
      
      // Firebase Imports
      import { initializeApp } from "firebase/app";
      import { 
        getAuth, 
        GoogleAuthProvider, 
        signInWithPopup, 
        signOut, 
        onAuthStateChanged,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        updateProfile
      } from "firebase/auth";
      import { getFirestore, doc, setDoc } from "firebase/firestore";
      import { getStorage, ref, uploadBytes, getDownloadURL } from "firebase/storage";
      import firebaseConfig from "./firebase-applet-config.json";

      // Initialize htm
      const html = htm.bind(React.createElement);

      // --- Inline UI Components (Tailwind) ---
      const Button = ({ children, variant = "primary", size = "md", className = "", ...props }) => {
        const variants = {
          primary: "bg-blue-600 text-white hover:bg-blue-700",
          secondary: "bg-zinc-100 text-zinc-900 hover:bg-zinc-200",
          outline: "border border-zinc-200 bg-white text-zinc-900 hover:bg-zinc-50",
          ghost: "text-zinc-600 hover:bg-zinc-100",
          destructive: "bg-red-600 text-white hover:bg-red-700"
        };
        const sizes = {
          sm: "h-8 px-3 text-xs",
          md: "h-10 px-4 text-sm",
          lg: "h-12 px-6 text-base",
          icon: "h-10 w-10 flex items-center justify-center"
        };
        return html`
          <button 
            className=${`inline-flex items-center justify-center rounded-md font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none ${variants[variant]} ${sizes[size]} ${className}`}
            ...${props}
          >
            ${children}
          </button>
        `;
      };

      const Card = ({ children, className = "" }) => html`
        <div className=${`rounded-xl border border-zinc-200 bg-white text-zinc-950 shadow-sm ${className}`}>
          ${children}
        </div>
      `;
      const CardHeader = ({ children, className = "" }) => html`<div className=${`flex flex-col space-y-1.5 p-6 ${className}`}>${children}</div>`;
      const CardTitle = ({ children, className = "" }) => html`<h3 className=${`text-2xl font-semibold leading-none tracking-tight ${className}`}>${children}</h3>`;
      const CardDescription = ({ children, className = "" }) => html`<p className=${`text-sm text-zinc-500 ${className}`}>${children}</p>`;
      const CardContent = ({ children, className = "" }) => html`<div className=${`p-6 pt-0 ${className}`}>${children}</div>`;

      const Input = ({ className = "", ...props }) => html`
        <input 
          className=${`flex h-10 w-full rounded-md border border-zinc-200 bg-white px-3 py-2 text-sm ring-offset-white file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-zinc-500 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 disabled:cursor-not-allowed disabled:opacity-50 ${className}`}
          ...${props}
        />
      `;

      const Badge = ({ children, variant = "outline", className = "" }) => {
        const variants = {
          outline: "border-zinc-200 text-zinc-950",
          primary: "bg-blue-600 text-white border-transparent",
          secondary: "bg-zinc-100 text-zinc-900 border-transparent",
          destructive: "bg-red-600 text-white border-transparent"
        };
        return html`
          <div className=${`inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 ${variants[variant]} ${className}`}>
            ${children}
          </div>
        `;
      };

      const Separator = ({ className = "" }) => html`<div className=${`shrink-0 bg-zinc-200 h-[1px] w-full ${className}`} />`;

      const ScrollArea = ({ children, className = "" }) => html`
        <div className=${`relative overflow-auto ${className}`}>
          ${children}
        </div>
      `;

      const Tabs = ({ value, onValueChange, children, className = "" }) => html`
        <div className=${`w-full ${className}`}>
          ${React.Children.map(children, child => 
            React.isValidElement(child) ? React.cloneElement(child, { value, onValueChange }) : child
          )}
        </div>
      `;
      const TabsList = ({ children, className = "" }) => html`
        <div className=${`inline-flex h-10 items-center justify-center rounded-md bg-zinc-100 p-1 text-zinc-500 ${className}`}>
          ${children}
        </div>
      `;
      const TabsTrigger = ({ value, activeValue, onValueChange, children, className = "" }) => html`
        <button 
          onClick=${() => onValueChange(value)}
          className=${`inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-medium ring-offset-white transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 disabled:pointer-events-none disabled:opacity-50 ${activeValue === value ? "bg-white text-zinc-950 shadow-sm" : "hover:text-zinc-900"} ${className}`}
        >
          ${children}
        </button>
      `;
      const TabsContent = ({ value, activeValue, children, className = "" }) => 
        activeValue === value ? html`<div className=${`mt-2 ring-offset-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 ${className}`}>${children}</div>` : null;

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
      const storage = getStorage(app);
      const googleProvider = new GoogleAuthProvider();

      function App() {
        const [user, setUser] = useState(null);
        const [isAuthReady, setIsAuthReady] = useState(false);
        const [activeTab, setActiveTab] = useState("orders");
        const [orders, setOrders] = useState([]);
        const [loading, setLoading] = useState(false);
        const [searchQuery, setSearchQuery] = useState("");
        
        // Login Form State
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [isRegistering, setIsRegistering] = useState(false);
        const [authLoading, setAuthLoading] = useState(false);
        
        // Profile State
        const [profileName, setProfileName] = useState("");
        const [profilePhotoUrl, setProfilePhotoUrl] = useState("");
        const [profileLoading, setProfileLoading] = useState(false);

        useEffect(() => {
          const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
            setUser(currentUser);
            if (currentUser) {
              setProfileName(currentUser.displayName || "");
              setProfilePhotoUrl(currentUser.photoURL || "");
            }
            setIsAuthReady(true);
          });
          return () => unsubscribe();
        }, []);

        const handleUpdateProfile = async (e) => {
          e.preventDefault();
          if (!user) return;
          setProfileLoading(true);
          try {
            await updateProfile(user, { 
              displayName: profileName,
              photoURL: profilePhotoUrl
            });
            
            // Also update Firestore document
            const userRef = doc(db, "users", user.uid);
            await setDoc(userRef, {
              displayName: profileName,
              photoURL: profilePhotoUrl,
              email: user.email,
              uid: user.uid,
              role: user.email === "brookrsbru@gmail.com" ? "admin" : "user"
            }, { merge: true });

            toast.success("Profile updated successfully");
          } catch (error) {
            toast.error(error.message || "Failed to update profile");
          } finally {
            setProfileLoading(false);
          }
        };

        const handlePhotoUpload = async (e) => {
          const file = e.target.files?.[0];
          if (!file || !user) return;

          setProfileLoading(true);
          try {
            const storageRef = ref(storage, `profiles/${user.uid}/${file.name}`);
            const snapshot = await uploadBytes(storageRef, file);
            const downloadURL = await getDownloadURL(snapshot.ref);
            
            setProfilePhotoUrl(downloadURL);
            
            // Update profile immediately with the new URL
            await updateProfile(user, { photoURL: downloadURL });
            
            // Sync with Firestore
            const userRef = doc(db, "users", user.uid);
            await setDoc(userRef, { photoURL: downloadURL }, { merge: true });
            
            toast.success("Photo uploaded successfully");
          } catch (error) {
            toast.error(error.message || "Failed to upload photo");
          } finally {
            setProfileLoading(false);
          }
        };

        const fetchOrders = async () => {
          if (!user) return;
          setLoading(true);
          try {
            const idToken = await user.getIdToken();
            const response = await fetch("/api/magento/orders", {
              headers: {
                Authorization: `Bearer ${idToken}`
              }
            });
            if (!response.ok) {
              const errorData = await response.json();
              throw new Error(errorData.error || "Failed to fetch orders");
            }
            const data = await response.json();
            setOrders(data.items || []);
            toast.success("Orders synced successfully");
          } catch (error) {
            toast.error(error.message || "Could not sync orders. Check your Magento settings.");
          } finally {
            setLoading(false);
          }
        };

        useEffect(() => {
          if (user) {
            fetchOrders();
          } else {
            setOrders([]);
          }
        }, [user]);

        const handleGoogleLogin = async () => {
          try {
            await signInWithPopup(auth, googleProvider);
            toast.success("Logged in successfully");
          } catch (error) {
            toast.error("Login failed");
          }
        };

        const handleEmailAuth = async (e) => {
          e.preventDefault();
          setAuthLoading(true);
          try {
            if (isRegistering) {
              await createUserWithEmailAndPassword(auth, email, password);
              toast.success("Account created successfully");
            } else {
              await signInWithEmailAndPassword(auth, email, password);
              toast.success("Logged in successfully");
            }
          } catch (error) {
            console.error("Auth Error:", error);
            toast.error(error.message || "Authentication failed");
          } finally {
            setAuthLoading(false);
          }
        };

        const handleLogout = async () => {
          try {
            await signOut(auth);
            toast.success("Logged out successfully");
          } catch (error) {
            toast.error("Logout failed");
          }
        };

        if (!isAuthReady) {
          return html`
            <div className="min-h-screen bg-zinc-50 flex items-center justify-center">
              <${RefreshCw} className="w-8 h-8 text-blue-600 animate-spin" />
            </div>
          `;
        }

        if (!user) {
          return html`
            <div className="min-h-screen bg-zinc-50 flex items-center justify-center p-4">
              <${Card} className="w-full max-w-md bg-white shadow-xl border-zinc-200">
                <${CardHeader} className="text-center space-y-2">
                  <div className="mx-auto w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center mb-2">
                    <${Truck} className="w-6 h-6 text-blue-600" />
                  </div>
                  <${CardTitle} className="text-2xl font-bold">Sawyer-Ship Manager</${CardTitle}>
                  <${CardDescription}>
                    ${isRegistering ? "Create your account." : "Secure access to your Magento shipping interface."}
                  </${CardDescription}>
                </${CardHeader}>
                <${CardContent} className="space-y-6">
                  <form onSubmit=${handleEmailAuth} className="space-y-4">
                    <div className="space-y-2">
                      <div className="relative">
                        <${Mail} className="absolute left-3 top-3 h-4 w-4 text-zinc-400" />
                        <${Input} 
                          type="email" 
                          placeholder="Email address" 
                          className="pl-10" 
                          value=${email}
                          onChange=${(e) => setEmail(e.target.value)}
                          required
                        />
                      </div>
                    </div>
                    <div className="space-y-2">
                      <div className="relative">
                        <${Lock} className="absolute left-3 top-3 h-4 w-4 text-zinc-400" />
                        <${Input} 
                          type="password" 
                          placeholder="Password" 
                          className="pl-10" 
                          value=${password}
                          onChange=${(e) => setPassword(e.target.value)}
                          required
                        />
                      </div>
                    </div>
                    <${Button} type="submit" className="w-full bg-blue-600 hover:bg-blue-700 h-11" disabled=${authLoading}>
                      ${authLoading ? (
                        html`<${RefreshCw} className="w-4 h-4 animate-spin" />`
                      ) : isRegistering ? (
                        "Create Account"
                      ) : (
                        "Sign In"
                      )}
                    </${Button}>
                  </form>

                  <div className="relative">
                    <div className="absolute inset-0 flex items-center">
                      <span className="w-full border-t border-zinc-200" />
                    </div>
                    <div className="relative flex justify-center text-xs uppercase">
                      <span className="bg-white px-2 text-zinc-500">Or continue with</span>
                    </div>
                  </div>

                  <${Button} variant="outline" className="w-full gap-2 h-11" onClick=${handleGoogleLogin} disabled=${authLoading}>
                    <${LogIn} className="w-4 h-4" />
                    Google Account
                  </${Button}>

                  <div className="text-center">
                    <button 
                      type="button"
                      className="text-sm text-blue-600 hover:underline font-medium"
                      onClick=${() => setIsRegistering(!isRegistering)}
                    >
                      ${isRegistering ? "Already have an account? Sign in" : "Need an account? Create one"}
                    </button>
                  </div>

                </${CardContent}>
              </${Card}>
            </div>
          `;
        }

        const filteredOrders = orders.filter(order => 
          order.increment_id.toLowerCase().includes(searchQuery.toLowerCase()) ||
          `${order.customer_firstname} ${order.customer_lastname}`.toLowerCase().includes(searchQuery.toLowerCase())
        );

        return html`
          <div className="min-h-screen bg-zinc-50 flex">
            <${Toaster} position="top-right" />
            
            {/* Sidebar */}
            <aside className="w-64 bg-white border-r border-zinc-200 flex flex-col">
              <div className="p-6 border-b border-zinc-200">
                <div className="flex items-center gap-2 font-bold text-xl text-zinc-900">
                  <${Truck} className="w-6 h-6 text-blue-600" />
                  <span>Sawyer-Ship</span>
                </div>
                <p className="text-xs text-zinc-500 mt-1 font-medium uppercase tracking-wider">Shipping Interface</p>
              </div>
              
              <nav className="flex-1 p-4 space-y-1">
                <${Button} 
                  variant=${activeTab === "orders" ? "secondary" : "ghost"} 
                  className="w-full justify-start gap-3"
                  onClick=${() => setActiveTab("orders")}
                >
                  <${LayoutDashboard} className="w-4 h-4" />
                  Dashboard
                </${Button}>
                <${Button} 
                  variant=${activeTab === "shipping" ? "secondary" : "ghost"} 
                  className="w-full justify-start gap-3"
                  onClick=${() => setActiveTab("shipping")}
                >
                  <${Package} className="w-4 h-4" />
                  Shipping
                </${Button}>
                <${Button} 
                  variant=${activeTab === "history" ? "secondary" : "ghost"} 
                  className="w-full justify-start gap-3"
                  onClick=${() => setActiveTab("history")}
                >
                  <${FileText} className="w-4 h-4" />
                  History
                </${Button}>
              </nav>
              
              <div className="p-4 border-t border-zinc-200 space-y-2">
                <div className="px-3 py-2 flex items-center gap-3">
                  <div className="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-xs overflow-hidden">
                    ${user.photoURL ? (
                      html`<img src=${user.photoURL} alt="Avatar" className="w-full h-full object-cover" referrerPolicy="no-referrer" />`
                    ) : (
                      user.displayName?.charAt(0) || user.email?.charAt(0)
                    )}
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="text-xs font-medium text-zinc-900 truncate">${user.displayName || "Admin"}</p>
                    <p className="text-[10px] text-zinc-500 truncate">${user.email}</p>
                  </div>
                </div>
                <${Button} 
                  variant=${activeTab === "settings" ? "secondary" : "ghost"} 
                  className="w-full justify-start gap-3"
                  onClick=${() => setActiveTab("settings")}
                >
                  <${SettingsIcon} className="w-4 h-4" />
                  Settings
                </${Button}>
                <${Button} 
                  variant="ghost" 
                  className="w-full justify-start gap-3 text-red-600 hover:text-red-700 hover:bg-red-50"
                  onClick=${handleLogout}
                >
                  <${LogOut} className="w-4 h-4" />
                  Logout
                </${Button}>
              </div>
            </aside>

            {/* Main Content */}
            <main className="flex-1 flex flex-col h-screen overflow-hidden">
              {/* Header */}
              <header className="h-16 bg-white border-b border-zinc-200 flex items-center justify-between px-8 shrink-0">
                <h1 className="text-lg font-semibold text-zinc-900 capitalize">
                  ${activeTab === "orders" ? "Order Management" : activeTab}
                </h1>
                <div className="flex items-center gap-4">
                  <div className="relative w-64">
                    <${Search} className="absolute left-2.5 top-2.5 h-4 w-4 text-zinc-500" />
                    <${Input} 
                      placeholder="Search orders..." 
                      className="pl-9 bg-zinc-50 border-zinc-200"
                      value=${searchQuery}
                      onChange=${(e) => setSearchQuery(e.target.value)}
                    />
                  </div>
                  <${Button} variant="outline" size="icon" onClick=${fetchOrders} disabled=${loading}>
                    <${RefreshCw} className=${`h-4 w-4 ${loading ? 'animate-spin' : ''}`} />
                  </${Button}>
                </div>
              </header>

              {/* Content Area */}
              <${ScrollArea} className="flex-1 p-8">
                <${Tabs} value=${activeTab} onValueChange=${setActiveTab} className="w-full">
                  <${TabsContent} value="orders" className="mt-0 space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <${Card} className="bg-white shadow-sm border-zinc-200">
                        <${CardHeader} className="pb-2">
                          <${CardDescription}>Pending Orders</${CardDescription}>
                          <${CardTitle} className="text-3xl font-bold">${orders.length}</${CardTitle}>
                        </${CardHeader}>
                        <${CardContent}>
                          <div className="flex items-center gap-1 text-xs text-zinc-500">
                            <${RefreshCw} className="w-3 h-3" />
                            Last updated just now
                          </div>
                        </${CardContent}>
                      </${Card}>
                      <${Card} className="bg-white shadow-sm border-zinc-200">
                        <${CardHeader} className="pb-2">
                          <${CardDescription}>Ready to Ship</${CardDescription}>
                          <${CardTitle} className="text-3xl font-bold">0</${CardTitle}>
                        </${CardHeader}>
                        <${CardContent}>
                          <div className="flex items-center gap-1 text-xs text-green-600">
                            <${CheckCircle2} className="w-3 h-3" />
                            All systems operational
                          </div>
                        </${CardContent}>
                      </${Card}>
                      <${Card} className="bg-white shadow-sm border-zinc-200">
                        <${CardHeader} className="pb-2">
                          <${CardDescription}>Carrier Alerts</${CardDescription}>
                          <${CardTitle} className="text-3xl font-bold">0</${CardTitle}>
                        </${CardHeader}>
                        <${CardContent}>
                          <div className="flex items-center gap-1 text-xs text-zinc-500">
                            <${AlertCircle} className="w-3 h-3" />
                            No active service alerts
                          </div>
                        </${CardContent}>
                      </${Card}>
                    </div>

                    <${Card} className="bg-white shadow-sm border-zinc-200">
                      <${CardHeader}>
                        <div className="flex items-center justify-between">
                          <div>
                            <${CardTitle}>Magento Orders</${CardTitle}>
                            <${CardDescription}>Manage and process your incoming store orders.</${CardDescription}>
                          </div>
                          <${Button} variant="outline" size="sm" onClick=${fetchOrders}>
                            Sync with Magento
                          </${Button}>
                        </div>
                      </${CardHeader}>
                      <${CardContent}>
                        <div className="relative w-full overflow-auto">
                          <table className="w-full caption-bottom text-sm">
                            <thead className="[&_tr]:border-b">
                              <tr className="border-b transition-colors hover:bg-zinc-100/50 data-[state=selected]:bg-zinc-100">
                                <th className="h-12 px-4 text-left align-middle font-medium text-zinc-500">Order ID</th>
                                <th className="h-12 px-4 text-left align-middle font-medium text-zinc-500">Customer</th>
                                <th className="h-12 px-4 text-left align-middle font-medium text-zinc-500">Date</th>
                                <th className="h-12 px-4 text-left align-middle font-medium text-zinc-500">Total</th>
                                <th className="h-12 px-4 text-left align-middle font-medium text-zinc-500">Status</th>
                                <th className="h-12 px-4 text-right align-middle font-medium text-zinc-500">Action</th>
                              </tr>
                            </thead>
                            <tbody className="[&_tr:last-child]:border-0">
                              ${filteredOrders.length === 0 ? (
                                html`
                                  <tr className="border-b transition-colors hover:bg-zinc-100/50 data-[state=selected]:bg-zinc-100">
                                    <td colSpan=${6} className="p-4 align-middle text-center py-12 text-zinc-500">
                                      ${loading ? "Fetching orders..." : "No orders found. Check your Magento connection."}
                                    </td>
                                  </tr>
                                `
                              ) : (
                                filteredOrders.map((order) => html`
                                  <tr key=${order.entity_id} className="border-b transition-colors hover:bg-zinc-100/50 data-[state=selected]:bg-zinc-100">
                                    <td className="p-4 align-middle font-medium">#${order.increment_id}</td>
                                    <td className="p-4 align-middle">${order.customer_firstname} ${order.customer_lastname}</td>
                                    <td className="p-4 align-middle">${new Date(order.created_at).toLocaleDateString()}</td>
                                    <td className="p-4 align-middle">$${order.grand_total.toFixed(2)}</td>
                                    <td className="p-4 align-middle">
                                      <${Badge} variant="outline" className="capitalize bg-blue-50 text-blue-700 border-blue-200">
                                        ${order.status}
                                      </${Badge}>
                                    </td>
                                    <td className="p-4 align-middle text-right">
                                      <${Button} variant="ghost" size="sm" className="gap-1">
                                        Ship <${ChevronRight} className="w-3 h-3" />
                                      </${Button}>
                                    </td>
                                  </tr>
                                `)
                              )}
                            </tbody>
                          </table>
                        </div>
                      </${CardContent}>
                    </${Card}>
                  </${TabsContent}>

                  <${TabsContent} value="settings" className="mt-0 space-y-6 overflow-y-auto max-h-[calc(100vh-160px)] pr-2 scrollbar-thin scrollbar-thumb-zinc-200">
                    <${Card} className="bg-white shadow-sm border-zinc-200">
                      <${CardHeader}>
                        <${CardTitle}>Profile Settings</${CardTitle}>
                        <${CardDescription}>Update your personal information.</${CardDescription}>
                      </${CardHeader}>
                      <${CardContent}>
                        <div className="flex items-center gap-4 mb-6">
                          <div className="w-16 h-16 rounded-full bg-zinc-100 border border-zinc-200 overflow-hidden flex items-center justify-center">
                            ${profilePhotoUrl ? (
                              html`<img src=${profilePhotoUrl} alt="Profile" className="w-full h-full object-cover" referrerPolicy="no-referrer" />`
                            ) : (
                              html`<${Truck} className="w-8 h-8 text-zinc-400" />`
                            )}
                          </div>
                          <div>
                            <h4 className="text-sm font-semibold">${profileName || "No Name Set"}</h4>
                            <p className="text-xs text-zinc-500">${user.email}</p>
                          </div>
                        </div>

                        <form onSubmit=${handleUpdateProfile} className="space-y-4 max-w-md">
                          <div className="space-y-2">
                            <label className="text-xs font-medium">Display Name</label>
                            <${Input} 
                              value=${profileName} 
                              onChange=${(e) => setProfileName(e.target.value)} 
                              placeholder="Your Name"
                            />
                          </div>
                          <div className="space-y-2">
                            <label className="text-xs font-medium">Profile Image</label>
                            <div className="flex items-center gap-3">
                              <${Input} 
                                type="file" 
                                accept="image/*" 
                                onChange=${handlePhotoUpload}
                                className="cursor-pointer"
                                disabled=${profileLoading}
                              />
                              ${profileLoading && html`<${RefreshCw} className="w-4 h-4 animate-spin text-zinc-400" />`}
                            </div>
                            <p className="text-[10px] text-zinc-500 italic">Upload a new profile picture.</p>
                          </div>
                          <div className="space-y-2">
                            <label className="text-xs font-medium">Email Address</label>
                            <${Input} value=${user.email || ""} disabled className="bg-zinc-50" />
                            <p className="text-[10px] text-zinc-500 italic">Email cannot be changed.</p>
                          </div>
                          <${Button} type="submit" disabled=${profileLoading} className="bg-blue-600 hover:bg-blue-700">
                            ${profileLoading ? html`<${RefreshCw} className="w-4 h-4 animate-spin" />` : "Update Profile"}
                          </${Button}>
                        </form>
                      </${CardContent}>
                    </${Card}>

                    <${Card} className="bg-white shadow-sm border-zinc-200">
                      <${CardHeader}>
                        <${CardTitle}>Integration Settings</${CardTitle}>
                        <${CardDescription}>Configure your API connections for Magento, UPS, and FedEx.</${CardDescription}>
                      </${CardHeader}>
                      <${CardContent} className="space-y-8">
                        <div className="space-y-4">
                          <h3 className="text-sm font-semibold uppercase tracking-wider text-zinc-500">Magento Store</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="space-y-2">
                              <label className="text-xs font-medium">Store URL</label>
                              <${Input} placeholder="https://your-magento-store.com" />
                            </div>
                            <div className="space-y-2">
                              <label className="text-xs font-medium">Access Token</label>
                              <${Input} type="password" placeholder="••••••••••••••••" />
                            </div>
                          </div>
                        </div>

                        <${Separator} />

                        <div className="space-y-4">
                          <h3 className="text-sm font-semibold uppercase tracking-wider text-zinc-500">UPS API</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="space-y-2">
                              <label className="text-xs font-medium">Client ID</label>
                              <${Input} placeholder="UPS Client ID" />
                            </div>
                            <div className="space-y-2">
                              <label className="text-xs font-medium">Client Secret</label>
                              <${Input} type="password" placeholder="••••••••••••••••" />
                            </div>
                          </div>
                        </div>

                        <${Separator} />

                        <div className="space-y-4">
                          <h3 className="text-sm font-semibold uppercase tracking-wider text-zinc-500">FedEx API</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="space-y-2">
                              <label className="text-xs font-medium">API Key</label>
                              <${Input} placeholder="FedEx API Key" />
                            </div>
                            <div className="space-y-2">
                              <label className="text-xs font-medium">Secret Key</label>
                              <${Input} type="password" placeholder="••••••••••••••••" />
                            </div>
                          </div>
                        </div>
                        
                        <div className="pt-4 flex justify-end">
                          <${Button} className="bg-blue-600 hover:bg-blue-700">Save Configuration</${Button}>
                        </div>
                      </${CardContent}>
                    </${Card}>
                  </${TabsContent}>
                </${Tabs}>
              </${ScrollArea}>
            </main>
          </div>
        `;
      }

      createRoot(document.getElementById('root')).render(
        html`
          <${StrictMode}>
            <${App} />
          </${StrictMode}>
        `
      );
    </script>
  </body>
</html>
